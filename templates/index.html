{% extends "base.html" %}
{% block title %}상품 목록 - 가지마켓{% endblock %}
{% block content %}
<section class="hero">
  <div>
    <p class="eyebrow">안전한 동네 중고거래</p>
    <h1>가지마켓</h1>
    <p>필요한 물건은 찾고, 쓰지 않는 물건은 안전하게 거래하세요.</p>
  </div>
  {% if g.user %}
    <div class="balance">내 포인트 <strong>{{ "{:,}".format(g.user.points) }}</strong>P</div>
  {% endif %}
</section>

<form class="search" method="get">
  <input name="q" value="{{ query }}" placeholder="상품명 또는 설명 검색">
  <select name="sort" aria-label="상품 정렬">
    <option value="latest" {% if sort == 'latest' %}selected{% endif %}>최신순</option>
    <option value="price_asc" {% if sort == 'price_asc' %}selected{% endif %}>낮은 가격순</option>
    <option value="price_desc" {% if sort == 'price_desc' %}selected{% endif %}>높은 가격순</option>
  </select>
  <button type="submit">검색</button>
</form>

<section class="grid" data-products-url="{{ url_for('product_list', q=query, sort=sort) }}">
  {% include "product_grid.html" %}
</section>
<script>
  (() => {
    const grid = document.querySelector(".grid[data-products-url]");
    if (!grid) return;

    let refreshing = false;
    let lastHtml = grid.innerHTML;

    const refreshProducts = async () => {
      if (refreshing || document.hidden) return;
      refreshing = true;
      try {
        const response = await fetch(grid.dataset.productsUrl, {
          headers: { "Accept": "application/json" },
        });
        if (!response.ok) return;
        const data = await response.json();
        if (data.html && data.html !== lastHtml) {
          grid.innerHTML = data.html;
          lastHtml = data.html;
        }
      } finally {
        refreshing = false;
      }
    };

    window.setInterval(refreshProducts, 3000);
    document.addEventListener("visibilitychange", refreshProducts);
  })();
</script>
{% endblock %}
