{% extends "base.html" %}
{% block title %}신고하기 - 가지마켓{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>신고하기</h1>
  <form method="post" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>대상 유형
      <select name="target_type">
        <option value="product" {% if target_type == 'product' %}selected{% endif %}>상품</option>
        <option value="user" {% if target_type == 'user' %}selected{% endif %}>사용자</option>
      </select>
    </label>
    <label>대상 ID<input name="target_id" value="{{ target_id }}" required></label>
    <label>신고 사유<textarea name="reason" rows="6" required></textarea></label>
    <button type="submit">신고 접수</button>
  </form>
</section>
{% endblock %}
