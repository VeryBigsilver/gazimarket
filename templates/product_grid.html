{% for product in products %}
  <article class="product-card {% if product.status == 'sold' %}sold{% endif %}">
    <a href="{{ url_for('product_detail', product_id=product.id) }}">
      {% if product.image_path %}
        <img src="{{ url_for('static', filename=product.image_path) }}" alt="{{ product.title }}">
      {% else %}
        <div class="placeholder">GAZI</div>
      {% endif %}
      <div class="card-body">
        <div class="status">{{ status_label(product.status) }}</div>
        <h2>{{ product.title }}</h2>
        <p class="price">{{ "{:,}".format(product.price) }}P</p>
        <p class="seller">{{ product.name }} · 신고 {{ product.report_count }}</p>
      </div>
    </a>
  </article>
{% else %}
  <p class="empty">등록된 상품이 없습니다.</p>
{% endfor %}
