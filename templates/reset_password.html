{% extends "base.html" %}
{% block title %}비밀번호 찾기 - 가지마켓{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>비밀번호 찾기</h1>
  <form method="post" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>아이디<input name="username" value="{{ request.form.get('username', '') }}" required></label>
    <label>이름<input name="name" value="{{ request.form.get('name', '') }}" required></label>
    <label>이메일<input name="email" type="email" value="{{ request.form.get('email', '') }}" required></label>
    <label>새 비밀번호<input name="new_password" type="password" required minlength="8"></label>
    <label>새 비밀번호 확인<input name="confirm_password" type="password" required minlength="8"></label>
    <button type="submit">비밀번호 재설정</button>
  </form>
  <div class="auth-links">
    <a href="{{ url_for('login') }}">로그인</a>
    <span aria-hidden="true">·</span>
    <a href="{{ url_for('find_id') }}">아이디 찾기</a>
  </div>
</section>
{% endblock %}
