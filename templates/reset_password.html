{% extends "base.html" %}
{% block title %}비밀번호 찾기 - 가지마켓{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>비밀번호 찾기</h1>
  <form method="post" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="action" value="send_code">
    <label>아이디<input name="username" value="{{ request.form.get('username', '') }}" required></label>
    <label>이름<input name="name" value="{{ request.form.get('name', '') }}" required></label>
    <label>이메일<input name="email" type="email" value="{{ request.form.get('email', '') }}" required></label>
    <button type="submit">인증번호 받기</button>
  </form>
  {% if verification_sent %}
    {% if dev_code %}
      <div class="security-note">개발용 인증번호: {{ dev_code }}</div>
    {% endif %}
    <form method="post" class="stack verification-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="action" value="reset_password">
      <input type="hidden" name="username" value="{{ request.form.get('username', '') }}">
      <input type="hidden" name="name" value="{{ request.form.get('name', '') }}">
      <input type="hidden" name="email" value="{{ request.form.get('email', '') }}">
      <label>인증번호<input name="verification_code" required inputmode="numeric" minlength="6" maxlength="6"></label>
      <label>새 비밀번호<input name="new_password" type="password" required minlength="8"></label>
      <label>새 비밀번호 확인<input name="confirm_password" type="password" required minlength="8"></label>
      <button type="submit">비밀번호 재설정</button>
    </form>
  {% endif %}
  <div class="auth-links">
    <a href="{{ url_for('login') }}">로그인</a>
    <span aria-hidden="true">·</span>
    <a href="{{ url_for('find_id') }}">아이디 찾기</a>
  </div>
</section>
{% endblock %}
