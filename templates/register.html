{% extends "base.html" %}
{% block title %}회원가입 - 가지마켓{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>회원가입</h1>
  <form method="post" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>아이디<input name="username" required minlength="3"></label>
    <label>비밀번호<input name="password" type="password" required minlength="8"></label>
    <label>이름<input name="name" required></label>
    <label>이메일<input name="email" type="email" required></label>
    <button type="submit">가입하기</button>
  </form>
</section>
{% endblock %}
