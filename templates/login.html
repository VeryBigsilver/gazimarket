{% extends "base.html" %}
{% block title %}로그인 - 가지마켓{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>로그인</h1>
  <form method="post" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>아이디<input name="username" required></label>
    <label>비밀번호<input name="password" type="password" required></label>
    <button type="submit">로그인</button>
  </form>
  <div class="auth-links">
    <a href="{{ url_for('find_id') }}">아이디 찾기</a>
    <span aria-hidden="true">·</span>
    <a href="{{ url_for('reset_password') }}">비밀번호 찾기</a>
  </div>
</section>
{% endblock %}
